media:
  input: public/images
  output: /images

content:
  - name: pages
    label: Pages
    type: collection
    path: src/content/pages
    filename: "{primary}.md"

    fields:
      - name: title
        label: Title
        type: string

      - name: heroTitle
        label: Hero Title
        type: string

      - name: heroText
        label: Hero Text
        type: rich-text

      - name: servicesTitle
        label: Services Title
        type: string

      - name: servicesContent
        label: Services Content
        type: rich-text